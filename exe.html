<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Center</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111827;
    color:white;
}

.download-screen{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:40px;
}

.container{
    width:100%;
    max-width:900px;
    margin:auto;
}

h2{
    margin-bottom:20px;
}

.file-item{
    background:#1f2937;
    padding:15px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.file-item span{
    display:flex;
    gap:10px;
    align-items:center;
}

.file-item small{
    opacity:0.7;
    font-size:13px;
}

.download-btn{
    background:#16a34a;
    color:white;
    text-decoration:none;
    padding:10px 15px;
    border-radius:8px;
    font-weight:bold;
}

.download-btn:hover{
    background:#15803d;
}
</style>
</head>

<body>

<div class="download-screen">
    <div class="container">

        <!-- <h2>Fayllar</h2> -->

        <div id="fileList"></div>

    </div>
</div>

<script>

    const files = [
        {
            name: "GP Agent",
            path: "files/GlobalProtect64-6.2.8-c263 (1).msi"
        },

    ];

    async function getFileSize(url){
        try{
            const res = await fetch(url, { method: "HEAD" });
            const size = res.headers.get("content-length");

            if(!size) return "Unknown";

            const mb = (size / (1024 * 1024)).toFixed(2);
            return mb + " MB";
        }catch(e){
            return "Unknown";
        }
    }

    const fileList = document.getElementById("fileList");

    async function renderFiles(){

        for(const file of files){

            const size = await getFileSize(file.path);

            const div = document.createElement("div");
            div.className = "file-item";

            div.innerHTML = `
                <span>
                    ${file.name}
                    <small>(${size})</small>
                </span>

                <a href="${file.path}" download class="download-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M7 22C5.67392 22 4.40215 21.4732 3.46447 20.5355C2.52678 19.5979 2 18.3261 2 17V14C2 13.7348 2.10536 13.4804 2.29289 13.2929C2.48043 13.1054 2.73478 13 3 13C3.26522 13 3.51957 13.1054 3.70711 13.2929C3.89464 13.4804 4 13.7348 4 14V17C4 17.7956 4.31607 18.5587 4.87868 19.1213C5.44129 19.6839 6.20435 20 7 20H17C17.7956 20 18.5587 19.6839 19.1213 19.1213C19.6839 18.5587 20 17.7956 20 17V14C20 13.7348 20.1054 13.4804 20.2929 13.2929C20.4804 13.1054 20.7348 13 21 13C21.2652 13 21.5196 13.1054 21.7071 13.2929C21.8946 13.4804 22 13.7348 22 14V17C22 18.3261 21.4732 19.5979 20.5355 20.5355C19.5979 21.4732 18.3261 22 17 22H7Z" fill="black"/>
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M17.715 10.9C17.807 10.9939 17.8795 11.105 17.9284 11.227C17.9774 11.349 18.0018 11.4794 18.0003 11.6108C17.9989 11.7422 17.9715 11.8721 17.9198 11.9929C17.8681 12.1137 17.7931 12.2232 17.699 12.315L13.199 16.715C13.0122 16.8976 12.7613 16.9999 12.5 16.9999C12.2388 16.9999 11.9879 16.8976 11.801 16.715L7.30103 12.315C7.20512 12.2237 7.12831 12.1142 7.07504 11.993C7.02178 11.8717 6.99313 11.7411 6.99076 11.6087C6.98839 11.4763 7.01234 11.3447 7.06123 11.2216C7.11011 11.0986 7.18296 10.9864 7.27554 10.8917C7.36812 10.797 7.47858 10.7217 7.60052 10.67C7.72246 10.6183 7.85345 10.5914 7.98588 10.5908C8.11831 10.5902 8.24955 10.6159 8.37197 10.6664C8.49439 10.7169 8.60557 10.7912 8.69903 10.885L11.5 13.624V5C11.5 4.73478 11.6054 4.48043 11.7929 4.29289C11.9805 4.10536 12.2348 4 12.5 4C12.7652 4 13.0196 4.10536 13.2071 4.29289C13.3947 4.48043 13.5 4.73478 13.5 5V13.624L16.3 10.885C16.394 10.7931 16.5051 10.7205 16.627 10.6716C16.749 10.6226 16.8794 10.5982 17.0108 10.5997C17.1423 10.6012 17.2721 10.6285 17.3929 10.6803C17.5138 10.732 17.6232 10.807 17.715 10.901V10.9Z" fill="black"/>
                    </svg>
                </a>
            `;

            fileList.appendChild(div);
        }
    }

    renderFiles();
</script>

</body>
</html>
